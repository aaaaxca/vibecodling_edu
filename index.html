<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바이브코딩 교육</title>

  <style>
    body{
      font-family: sans-serif;
      background:#f5f5f5;
      text-align:center;
      padding-top:100px;
    }

    h1{
      color:#222;
      font-size:48px;
    }

    p{
      font-size:24px;
      color:#666;
    }

    .box{
      background:white;
      width:600px;
      margin:auto;
      padding:50px;
      border-radius:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<div class="box">
  <h1>바이브코딩 교육</h1>
  <p>GitHub Pages 배포 성공 🚀</p>
</div>

</body>
</html>
